<!DOCTYPE html>
<html>
<head>
<title>Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
font-family:Poppins;
padding:40px;
}

.form{
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
max-width:400px;
margin:auto;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:10px;
}

button{
background:#00ffcc;
padding:10px;
border:none;
width:100%;
}
</style>
</head>

<body>

<div class="form">
<h1>Contact Us</h1>
<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<textarea placeholder="Message"></textarea>
<button>Send</button>
</div>

</body>
</html>
