<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us - Fitness Guide Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:#0f172a;
color:#e2e8f0;
}

/* Navbar */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:#020617;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.logo{
color:#22c55e;
font-size:22px;
font-weight:bold;
}

.navbar a{
color:#e2e8f0;
text-decoration:none;
margin:0 15px;
transition:0.3s;
}

.navbar a:hover{
color:#22c55e;
}

/* Container */
.container{
max-width:600px;
margin:80px auto;
background:#020617;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

/* Form */
input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:#22c55e;
color:black;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#16a34a;
}

/* Footer */
.footer{
text-align:center;
padding:20px;
opacity:0.6;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
<div class="logo">Fitness Guide Hub</div>
<div>
<a href="index.html">Home</a>
<a href="blog.html">Blog</a>
<a href="diet.html">Diet</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>
</div>

<!-- Contact Section -->
<div class="container">

<h1>Contact Us</h1>

<p>If you have any questions, suggestions, or feedback, feel free to contact us. We will try to respond as soon as possible.</p>

<form action="https://formsubmit.co/Sammrat471@gmail.com" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" rows="5" placeholder="Your Message" required></textarea>

<!-- Hidden settings -->
<input type="hidden" name="_captcha" value="false">

<button type="submit">Send Message</button>

</form>

</div>

<!-- Footer -->
<div class="footer">
<p>© 2026 Fitness Guide Hub | All Rights Reserved</p>
</div>

</body>
</html>
